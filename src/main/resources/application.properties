# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=INFO

# Daraja / M-Pesa
daraja.mock-enabled=${DARAJA_MOCK_ENABLED:true}
daraja.base-url=${DARAJA_BASE_URL:https://sandbox.safaricom.co.ke}
daraja.consumer-key=${DARAJA_CONSUMER_KEY:}
daraja.consumer-secret=${DARAJA_CONSUMER_SECRET:}
daraja.short-code=${DARAJA_SHORT_CODE:}
daraja.passkey=${DARAJA_PASSKEY:}
daraja.callback-url=${DARAJA_CALLBACK_URL:http://localhost:8080/api/bookings/payments/mpesa/callback}
daraja.transaction-type=${DARAJA_TRANSACTION_TYPE:CustomerPayBillOnline}
